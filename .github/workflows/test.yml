name: Tests

permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  testing:
    runs-on: ubuntu-latest
    needs: flake8
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    # this is v4.2.2
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        # without fetch-depth, we do not get "origin/master" or "master"
        # branch -- seems like there should be a less "heavyweight"
        # approach to fix this; we want this so the "git diff
        #  origin/master..HEAD" below works for coverage display
        fetch-depth: "0"
        ref: "${{ github.event.pull_request.head.sha || github.sha }}"
        persist-credentials: false

    - name: Set up Python
      # this is v4.9.1
      uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip tox codecov cuvner

    - name: Test
      run: |
        python --version
        tox -e coverage

    - name: PR Coverage Graph
      shell: bash
      run: git diff origin/master..HEAD | cuv diff -
      continue-on-error: true

  flake8:
    runs-on: ubuntu-latest

    steps:
    # this is v4.2.2
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        persist-credentials: false

    - name: Set up Python
      # this is v4.9.1
      uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip tox

    - name: Flake8
      run: |
        python --version
        tox -e flake8less

  docs:
    runs-on: ubuntu-latest

    steps:
    # this is v4.2.2
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        persist-credentials: false

    - name: Set up Python
      # this is v4.9.1
      uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip tox
        python -m pip install -r docs/requirements.txt

    - name: Docs
      run: |
        python --version
        tox -e docs
